<div class="tabs">

<!-- ★追加：カウントアップ専用タブ -->
<div id="countupTab" class="tab"></div>

<script>
function showTab(tabId){

  document.querySelectorAll(".tab").forEach(el=>{
    el.style.display = "none"
  })

  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.classList.remove("active")
  })

  const activeTab = document.getElementById(tabId)
  if(activeTab){
    activeTab.style.display = "block"
  }

  document.querySelectorAll(".tab-btn").forEach(btn=>{
    const onclickText = btn.getAttribute("onclick") || ""
    if(onclickText.includes(`'${tabId}'`)){
      btn.classList.add("active")
    }
  })

  // ★ここが重要（描画トリガ）
  if(tabId === "countupTab"){
    renderCountup()
  }
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="heroes.js"></script>
<script src="groups.js"></script>
<script src="players.js"></script>
<script src="alliances.js"></script>
<script src="playerHeroes.js"></script>
<script src="rally.js"></script>
<script src="assign.js"></script>
<script src="countup.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDs-jLrDT8s_lymDkDU2VGET0RKeuVvulc",
  authDomain: "rally-app-d8610.firebaseapp.com",
  projectId: "rally-app-d8610",
  storageBucket: "rally-app-d8610.firebasestorage.app",
  messagingSenderId: "439294990582",
  appId: "1:439294990582:web:63c2f273b9f4d5e56af4d7"
}

firebase.initializeApp(firebaseConfig)

window.db = firebase.firestore()
window.auth = firebase.auth()

window.firestoreUnsubscribers = []

function clearFirestoreListeners(){
  window.firestoreUnsubscribers.forEach(fn=>{
    try{
      fn()
    }
    catch(e){
      console.error(e)
    }
  })
  window.firestoreUnsubscribers = []
}

function startRealtimeSync(){

  clearFirestoreListeners()

  window.firestoreUnsubscribers.push(
    window.db.collection("heroes").onSnapshot(snapshot=>{
      const list = []
      snapshot.forEach(doc=>{
        const data = doc.data() || {}
        list.push({
          id: doc.id,
          name: data.name || ""
        })
      })
      list.sort((a,b)=>a.name.localeCompare(b.name))
      setState("heroes", list)
    }, err=>console.error("heroes sync error", err))
  )

  window.firestoreUnsubscribers.push(
    window.db.collection("alliances").onSnapshot(snapshot=>{
      const list = []
      snapshot.forEach(doc=>{
        const data = doc.data() || {}
        list.push({
          id: doc.id,
          name: data.name || ""
        })
      })
      list.sort((a,b)=>a.name.localeCompare(b.name))
      setState("alliances", list)
    }, err=>console.error("alliances sync error", err))
  )

  window.firestoreUnsubscribers.push(
    window.db.collection("groups").onSnapshot(snapshot=>{
      const list = []
      snapshot.forEach(doc=>{
        const data = doc.data() || {}
        list.push({
          id: doc.id,
          name: data.name || ""
        })
      })
      list.sort((a,b)=>a.name.localeCompare(b.name))
      setState("groups", list)
    }, err=>console.error("groups sync error", err))
  )

  window.firestoreUnsubscribers.push(
    window.db.collection("players").onSnapshot(snapshot=>{
      const list = []
      snapshot.forEach(doc=>{
        const data = doc.data() || {}
        list.push({
          id: doc.id,
          name: data.name || "",
          alliance: data.alliance || "",
          group: data.group || "",
          heroes: Array.isArray(data.heroes) ? data.heroes : [],
          active: data.active !== false,
          joinTime: data.joinTime || ""
        })
      })
      list.sort((a,b)=>{
        const aa = a.alliance || ""
        const bb = b.alliance || ""
        const c = aa.localeCompare(bb)
        if(c !== 0) return c
        return a.name.localeCompare(b.name)
      })
      setState("players", list)
    }, err=>console.error("players sync error", err))
  )

  window.firestoreUnsubscribers.push(
    window.db.collection("rallies").onSnapshot(snapshot=>{
      const list = []
      snapshot.forEach(doc=>{
        const data = doc.data() || {}
        list.push({
          id: doc.id,
          leaderId: data.leaderId || "",
          rate: data.rate || "",
          marchTime: Number(data.marchTime || 0),
          heroes: Array.isArray(data.heroes) ? data.heroes : [],
          active: data.active !== false
        })
      })
      list.sort((a,b)=>a.leaderId.localeCompare(b.leaderId))
      setState("rallies", list)
    }, err=>console.error("rallies sync error", err))
  )
}

document.addEventListener("DOMContentLoaded", ()=>{

  showTab("heroes")

  firebase.auth().signInAnonymously()
  .then(()=>{
    console.log("Firebase接続OK")
    startRealtimeSync()
  })
  .catch(e=>{
    console.error("Firebaseエラー", e)
    alert("Firebase接続に失敗しました")
  })
})
</script>
