<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>集結振り分けツール</title>

<style>
body{font-family:sans-serif;padding:20px}
table{border-collapse:collapse;margin-bottom:20px}
td,th{border:1px solid #ccc;padding:6px}
button{padding:8px 14px;margin:5px}
</style>

</head>
<body>

<h2>英雄保持</h2>

英雄 <input id="hero">
プレイヤー <input id="player">
<button onclick="addHero()">追加</button>

<table id="heroTable">
<tr><th>英雄</th><th>プレイヤー</th></tr>
</table>


<h2>集結設定</h2>

集結 <input id="rally">
英雄 <input id="rallyHero">
人数 <input id="need" type="number">

<button onclick="addRally()">追加</button>

<table id="rallyTable">
<tr><th>集結</th><th>英雄</th><th>人数</th></tr>
</table>


<button onclick="assign()">自動振り分け</button>

<h2>結果</h2>

<table id="result">
<tr><th>集結</th><th>英雄</th><th>プレイヤー</th></tr>
</table>


<script>

let heroes = JSON.parse(localStorage.getItem("heroes") || "[]")
let rallies = JSON.parse(localStorage.getItem("rallies") || "[]")

function save(){
localStorage.setItem("heroes",JSON.stringify(heroes))
localStorage.setItem("rallies",JSON.stringify(rallies))
}

function render(){

let h=""
heroes.forEach(x=>{
h+=`<tr><td>${x.hero}</td><td>${x.player}</td></tr>`
})
heroTable.innerHTML="<tr><th>英雄</th><th>プレイヤー</th></tr>"+h

let r=""
rallies.forEach(x=>{
r+=`<tr><td>${x.rally}</td><td>${x.hero}</td><td>${x.need}</td></tr>`
})
rallyTable.innerHTML="<tr><th>集結</th><th>英雄</th><th>人数</th></tr>"+r
}

function addHero(){

heroes.push({
hero:hero.value,
player:player.value
})

hero.value=""
player.value=""

save()
render()

}

function addRally(){

rallies.push({
rally:rally.value,
hero:rallyHero.value,
need:Number(need.value)
})

rally.value=""
rallyHero.value=""
need.value=""

save()
render()

}

function assign(){

let used=new Set()

let res=""

rallies.forEach(r=>{

let count=r.need

heroes.forEach(h=>{

if(h.hero==r.hero && !used.has(h.player) && count>0){

res+=`<tr>
<td>${r.rally}</td>
<td>${r.hero}</td>
<td>${h.player}</td>
</tr>`

used.add(h.player)
count--

}

})

if(count>0){

res+=`<tr>
<td>${r.rally}</td>
<td>${r.hero}</td>
<td>不在</td>
</tr>`

}

})

result.innerHTML="<tr><th>集結</th><th>英雄</th><th>プレイヤー</th></tr>"+res

}

render()

</script>

</body>
</html>
